<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicWear</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<header style="background-color: black; color: white; text-align: center; padding: 20px;">
    <h1>MusicWear 🎵</h1>
    <h3>Tu tienda de merch oficial</h3>
</header>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">MusicWear</a>
    </div>
</nav>

<br><br>

<div class="container">
    <div class="row">
        <div class="col-6">
            <h1>Encuentra la mejor merch de tus artistas favoritos 🎤</h1>
        </div>

        <div class="col-6">
            <img src="kendrick.jpeg" style="width:100%; height:300px; object-fit:cover;">
        </div>
    </div>
</div>

<br>

<!-- Carrusel -->
<div id="carouselExampleIndicators" class="carousel slide">

    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="Alvarito.jpeg" class="d-block w-100" style="height:400px; object-fit:contain; background-color:white;">
      </div>
      <div class="carousel-item">
        <img src="kendrick.jpeg" class="d-block w-100" style="height:400px; object-fit:contain; background-color:white;">
      </div>
      <div class="carousel-item">
        <img src="Nsqk.jpeg" class="d-block w-100" style="height:400px; object-fit:contain; background-color:white;">
      </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

</div>

<br><br>

<!-- Productos -->
<div class="container">
    <h2 class="text-center">Productos 🔥</h2>
    <div class="row">

        <div class="col-4">
            <img src="Alvarito.jpeg" class="card-img-top" style="height:250px; object-fit:contain; background-color:white;">>
            <h5>Playera Alvaro Díaz</h5>
            <p>$500 MXN</p>
        </div>

        <div class="col-4">
            <img src="Nsqk.jpeg" style="width:100%; height:250px; object-fit:cover;">
            <h5>Hoodie Nsqk</h5>
            <p>$1200 MXN</p>
        </div>

        <div class="col-4">
            <img src="kendrick.jpeg" style="width:100%; height:250px; object-fit:cover;">
            <h5>Hoodie Kendrick Lamar</h5>
            <p>$800 MXN</p>
        </div>

    </div>
</div>

</body>
</html>
